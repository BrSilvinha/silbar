<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <filter id="glow-r">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#0d0d0d"/>
  <rect width="64" height="64" rx="10" fill="none" stroke="#cc000066" stroke-width="1.5"/>
  <!-- J - red glow -->
  <text x="3" y="52" font-family="Arial Black, Impact, sans-serif" font-size="50" font-weight="900" fill="#cc0000" filter="url(#glow-r)">J</text>
  <!-- S - gold glow -->
  <text x="30" y="52" font-family="Arial Black, Impact, sans-serif" font-size="50" font-weight="900" fill="#ffd700" filter="url(#glow-g)">S</text>
</svg>
